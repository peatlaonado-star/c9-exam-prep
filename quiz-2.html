<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบเตรียมสอบเลื่อนระดับ ธ.ก.ส. ชุดที่ 2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',Arial,sans-serif;background:#f0f4f8;color:#222;font-size:16px}
header{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;padding:20px 24px;text-align:center}
header h1{font-size:1.4em;margin-bottom:6px}
header p{font-size:.9em;opacity:.85}
.badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.badge{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:.8em}
.controls{background:#fff;padding:16px 20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.controls label{font-size:.85em;color:#555;font-weight:600}
select,button{padding:7px 14px;border-radius:8px;border:1px solid #ccc;font-family:inherit;font-size:.9em;cursor:pointer}
button{background:#2e86c1;color:#fff;border:none;font-weight:600;transition:.2s}
button:hover{background:#1a5276}
button.secondary{background:#7f8c8d}
button.secondary:hover{background:#566573}
.progress-bar{width:100%;background:#e0e0e0;border-radius:10px;height:8px;margin:8px 0}
.progress-fill{height:8px;border-radius:10px;background:linear-gradient(90deg,#2e86c1,#27ae60);transition:.4s}
.score-box{background:#fff;border:2px solid #2e86c1;border-radius:12px;padding:8px 20px;font-weight:700;color:#1a5276;white-space:nowrap}
#quiz-area{max-width:860px;margin:24px auto;padding:0 16px 60px}
.category-title{background:#2e86c1;color:#fff;border-radius:10px 10px 0 0;padding:10px 18px;font-weight:700;font-size:1em;margin-top:28px}
.q-card{background:#fff;border-radius:0 0 10px 10px;margin-bottom:4px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.q-card+.q-card{border-top:1px solid #f0f0f0;border-radius:0}
.q-card:last-child{border-radius:0 0 10px 10px}
.q-header{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.q-num{background:#2e86c1;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.8em;font-weight:700;flex-shrink:0;margin-top:2px}
.q-text{font-weight:600;line-height:1.6;flex:1}
.q-meta{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tag{font-size:.72em;padding:2px 9px;border-radius:12px;font-weight:600}
.tag-cat{background:#eaf2fb;color:#1a5276}
.tag-lvl{background:#fef9e7;color:#9a7d0a}
.tag-lvl.จำ{background:#eafaf1;color:#1e8449}
.tag-lvl.เข้าใจ{background:#eaf2fb;color:#1a5276}
.tag-lvl.ประยุกต์{background:#fef5e7;color:#b7770d}
.tag-lvl.วิเคราะห์{background:#fdedec;color:#c0392b}
.options{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.opt{padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;cursor:pointer;transition:.15s;line-height:1.5}
.opt:hover{border-color:#2e86c1;background:#eaf2fb}
.opt.selected{border-color:#2e86c1;background:#d6eaf8}
.opt.correct{border-color:#27ae60;background:#eafaf1;font-weight:700}
.opt.wrong{border-color:#e74c3c;background:#fdedec}
.opt.show-correct{border-color:#27ae60;background:#eafaf1}
.btn-submit{background:#27ae60;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;font-size:.9em;transition:.2s}
.btn-submit:hover{background:#1e8449}
.btn-submit:disabled{background:#bdc3c7;cursor:not-allowed}
.explanation{background:#f8f9fa;border-left:4px solid #2e86c1;padding:12px 14px;border-radius:0 8px 8px 0;font-size:.88em;line-height:1.7;margin-top:8px;display:none}
.explanation.show{display:block}
.result-icon{font-size:1.2em;margin-right:6px}
#summary{display:none;max-width:860px;margin:30px auto;padding:0 16px 60px}
.summary-card{background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
.big-score{font-size:3em;font-weight:800;color:#2e86c1;margin:10px 0}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:20px 0}
.s-item{background:#f8f9fa;border-radius:10px;padding:14px;text-align:center}
.s-item .s-val{font-size:1.5em;font-weight:700;color:#2e86c1}
.s-item .s-lbl{font-size:.8em;color:#666;margin-top:4px}
</style>
</head>
<body>
<header>
  <h1>📚 แบบทดสอบเตรียมสอบเลื่อนระดับ ธ.ก.ส. ชุดที่ 2</h1>
  <p>ครอบคลุมหัวข้อ: ก่อสร้างอาคาร · ทรัพย์สิน · นายหน้าประกันภัย · สินเชื่อกลุ่มบุคคล · ธนาคารชุมชน · เงินฝาก · ธุรกิจอิเล็กทรอนิกส์ · ค่าธรรมเนียม · CIF</p>
  <div class="badges">
    <span class="badge">🟢 จำ</span><span class="badge">🔵 เข้าใจ</span><span class="badge">🟡 ประยุกต์</span><span class="badge">🔴 วิเคราะห์สถานการณ์</span>
  </div>
</header>
<div class="controls">
  <label>หมวด:</label>
  <select id="filterCat">
    <option value="all">ทั้งหมด</option>
    <option>ก่อสร้างอาคาร</option>
    <option>การบริหารทรัพย์สิน</option>
    <option>นายหน้าประกันภัย</option>
    <option>สินเชื่อกลุ่มบุคคล</option>
    <option>ธนาคารชุมชน</option>
    <option>เงินฝาก</option>
    <option>ธุรกิจอิเล็กทรอนิกส์</option>
    <option>ค่าธรรมเนียม</option>
    <option>CIF</option>
  </select>
  <label>ระดับ:</label>
  <select id="filterLvl">
    <option value="all">ทั้งหมด</option>
    <option>จำ</option><option>เข้าใจ</option><option>ประยุกต์</option><option>วิเคราะห์</option>
  </select>
  <label>จำนวน:</label>
  <select id="filterN">
    <option value="all">ทั้งหมด</option>
    <option value="10">10 ข้อ</option>
    <option value="20">20 ข้อ</option>
    <option value="30">30 ข้อ</option>
  </select>
  <button onclick="startQuiz()">▶ เริ่มทำข้อสอบ</button>
  <button class="secondary" onclick="showSummary()">📊 ดูผล</button>
  <div class="score-box">คะแนน: <span id="scoreDisp">0</span>/<span id="totalDisp">0</span></div>
</div>
<div id="quiz-area"></div>
<div id="summary">
  <div class="summary-card">
    <h2>🏆 สรุปผลการทำข้อสอบ</h2>
    <div class="big-score" id="sumScore">-</div>
    <div class="summary-grid" id="sumGrid"></div>
    <button onclick="startQuiz()" style="margin-top:10px">🔄 ทำใหม่</button>
  </div>
</div>

<script>
const ALL_Q = [
// ===== ก่อสร้างอาคาร =====
{id:1,cat:"ก่อสร้างอาคาร",level:"จำ",q:"ตามระเบียบ ธ.ก.ส. งานก่อสร้างอาคารที่มีวงเงินเกินเท่าไรต้องผ่านการอนุมัติจากคณะกรรมการ ธ.ก.ส.?",
opts:["เกิน 5 ล้านบาท","เกิน 10 ล้านบาท","เกิน 50 ล้านบาท","เกิน 100 ล้านบาท"],ans:2,
exp:"โครงการก่อสร้างอาคารที่มีวงเงินสูงเกิน 50 ล้านบาท จะต้องนำเสนอขออนุมัติต่อคณะกรรมการ ธ.ก.ส. ตามระเบียบที่กำหนด เพื่อความโปร่งใสและการกำกับดูแลที่ดี"},
{id:2,cat:"ก่อสร้างอาคาร",level:"จำ",q:"เอกสารสำคัญที่ต้องจัดทำก่อนดำเนินการก่อสร้างอาคารของ ธ.ก.ส. คือข้อใด?",
opts:["TOR (Terms of Reference)","BOQ (Bill of Quantities)","MOU (Memorandum of Understanding)","LOI (Letter of Intent)"],ans:1,
exp:"BOQ (Bill of Quantities) หรือบัญชีปริมาณงานและราคา เป็นเอกสารสำคัญที่กำหนดรายละเอียดของงานก่อสร้างทุกรายการพร้อมราคา ใช้เป็นฐานในการคัดเลือกผู้รับจ้างและควบคุมงบประมาณ"},
{id:3,cat:"ก่อสร้างอาคาร",level:"เข้าใจ",q:"หน้าที่ของ \"ผู้ควบคุมงาน\" ในโครงการก่อสร้างอาคารของ ธ.ก.ส. คืออะไร?",
opts:["ออกแบบสถาปัตยกรรมและวิศวกรรม","ตรวจสอบและรับรองความถูกต้องของการก่อสร้างให้เป็นไปตามแบบและสัญญา","อนุมัติการจ่ายเงินค่าก่อสร้าง","เจรจาต่อรองราคากับผู้รับจ้าง"],ans:1,
exp:"ผู้ควบคุมงานมีหน้าที่หลักในการตรวจสอบและควบคุมการปฏิบัติงานของผู้รับจ้างให้เป็นไปตามแบบก่อสร้าง ข้อกำหนด และสัญญา รวมถึงตรวจรับงานในแต่ละงวด"},
{id:4,cat:"ก่อสร้างอาคาร",level:"ประยุกต์",q:"สาขาพบว่าผู้รับจ้างก่อสร้างอาคารสาขาใหม่ทำงานล่าช้ากว่ากำหนดในสัญญา ควรดำเนินการอย่างไรก่อน?",
opts:["บอกเลิกสัญญาทันที","แจ้งเตือนเป็นลายลักษณ์อักษรและเรียกประชุมเพื่อหาแนวทางแก้ไข","รอจนครบกำหนดส่งงานก่อนค่อยดำเนินการ","ประสานหน่วยงานส่วนกลางให้จัดหาผู้รับจ้างรายใหม่ทันที"],ans:1,
exp:"เมื่อผู้รับจ้างทำงานล่าช้า ขั้นตอนแรกคือการแจ้งเตือนเป็นลายลักษณ์อักษร (หนังสือบอกกล่าว) เพื่อให้ผู้รับจ้างทราบและเร่งรัดการทำงาน และประชุมหารือเพื่อหาแนวทางแก้ไข ก่อนพิจารณาใช้มาตรการทางสัญญาต่อไป"},
{id:5,cat:"ก่อสร้างอาคาร",level:"วิเคราะห์",q:"สถานการณ์: ระหว่างก่อสร้างอาคารสาขา พบรอยร้าวที่เสาหลัก ผู้รับจ้างอ้างว่าเป็นรอยร้าวเล็กน้อยไม่กระทบความแข็งแรง แต่ผู้ควบคุมงานไม่แน่ใจ ควรดำเนินการอย่างไร?",
opts:["เชื่อผู้รับจ้างและดำเนินการก่อสร้างต่อ","หยุดงานในส่วนที่เกี่ยวข้องและจ้างวิศวกรอิสระตรวจสอบก่อน","แจ้งผู้บริหารและรอคำสั่งโดยไม่ต้องหยุดงาน","รื้อทำลายส่วนที่มีปัญหาทันที"],ans:1,
exp:"ความปลอดภัยต้องมาก่อนเสมอ เมื่อพบข้อสงสัยด้านโครงสร้าง ต้องหยุดงานในส่วนนั้นก่อน แล้วจ้างวิศวกรโครงสร้างอิสระตรวจสอบและออกความเห็น เพื่อความปลอดภัยและเป็นหลักฐานทางกฎหมาย ไม่ควรดำเนินการต่อจนกว่าจะมีความมั่นใจ"},

// ===== การบริหารทรัพย์สิน =====
{id:6,cat:"การบริหารทรัพย์สิน",level:"จำ",q:"ทรัพย์สินรอการขาย (NPA - Non-Performing Asset) ของ ธ.ก.ส. หมายถึงอะไร?",
opts:["ทรัพย์สินที่ ธ.ก.ส. ซื้อมาเพื่อลงทุน","อสังหาริมทรัพย์หรือทรัพย์สินที่ ธ.ก.ส. ได้รับมาจากการชำระหนี้หรือการบังคับคดี","ทรัพย์สินที่ใช้ในการดำเนินงานของสาขา","เงินฝากที่ไม่มีการเคลื่อนไหวเกิน 10 ปี"],ans:1,
exp:"NPA (Non-Performing Asset) หรือทรัพย์สินรอการขาย คือทรัพย์สินที่ ธ.ก.ส. ได้รับมาจากการชำระหนี้ การบังคับคดี หรือการรับโอน ธนาคารต้องรีบจำหน่ายออกเพื่อลดภาระและนำเงินกลับมาใช้ประโยชน์"},
{id:7,cat:"การบริหารทรัพย์สิน",level:"จำ",q:"อายุการใช้งานของครุภัณฑ์คอมพิวเตอร์ของ ธ.ก.ส. ตามระเบียบการบริหารทรัพย์สินโดยทั่วไปกำหนดไว้กี่ปี?",
opts:["3 ปี","5 ปี","7 ปี","10 ปี"],ans:1,
exp:"ครุภัณฑ์คอมพิวเตอร์และอุปกรณ์ IT มีอายุการใช้งานตามระเบียบประมาณ 5 ปี หลังครบกำหนดจะต้องผ่านกระบวนการประเมินสภาพ ซ่อมบำรุง หรือจำหน่ายออกตามระเบียบ"},
{id:8,cat:"การบริหารทรัพย์สิน",level:"เข้าใจ",q:"วัตถุประสงค์หลักของการทำ \"ทะเบียนทรัพย์สิน\" ใน ธ.ก.ส. คืออะไร?",
opts:["เพื่อคำนวณภาษีทรัพย์สินประจำปี","เพื่อควบคุมและติดตามทรัพย์สินให้มีความถูกต้องครบถ้วน ลดการสูญหายและการใช้งานผิดวัตถุประสงค์","เพื่อประเมินมูลค่าตลาดสำหรับการขายทอดตลาด","เพื่อแสดงต่อผู้ตรวจสอบบัญชีภายนอกเท่านั้น"],ans:1,
exp:"ทะเบียนทรัพย์สินเป็นเครื่องมือสำคัญในการบริหารจัดการ ช่วยให้ผู้บริหารทราบจำนวน ประเภท ตำแหน่งที่ตั้ง และสภาพของทรัพย์สิน ป้องกันการสูญหาย และใช้เป็นฐานในการวางแผนซ่อมบำรุงและจัดซื้อทดแทน"},
{id:9,cat:"การบริหารทรัพย์สิน",level:"ประยุกต์",q:"คอมพิวเตอร์ของสาขาเสียหายจนซ่อมไม่ได้ สาขาควรดำเนินการอย่างไรตามระเบียบ?",
opts:["จำหน่ายออกเองในราคาที่เห็นสมควร","รายงานต่อผู้บังคับบัญชา แต่งตั้งคณะกรรมการตรวจสอบสภาพและจำหน่ายตามระเบียบ ธ.ก.ส.","นำไปทิ้งหรือบริจาคทันที","เก็บรักษาไว้จนกว่าจะมีคำสั่งจากส่วนกลาง"],ans:1,
exp:"การจำหน่ายทรัพย์สินของ ธ.ก.ส. ต้องปฏิบัติตามระเบียบอย่างเคร่งครัด คือ รายงานผู้บังคับบัญชา แต่งตั้งคณะกรรมการตรวจสภาพ จัดทำรายงาน และดำเนินการจำหน่ายด้วยวิธีที่ได้รับอนุมัติ (ขายทอดตลาด/ขายโดยวิธีอื่น)"},
{id:10,cat:"การบริหารทรัพย์สิน",level:"วิเคราะห์",q:"สถานการณ์: สาขาต้องการใช้ห้องที่ไม่ได้ใช้ประโยชน์ในอาคารสาขาเพื่อปล่อยเช่าให้ร้านค้าชุมชน เพื่อสร้างรายได้เสริม ควรพิจารณาเรื่องใดก่อน?",
opts:["เจรจาราคาค่าเช่ากับผู้เช่าทันที","ตรวจสอบว่าอาคารเป็นกรรมสิทธิ์ของ ธ.ก.ส. และขออนุมัติจากส่วนกลางก่อนดำเนินการ","ปล่อยเช่าได้เลยโดยไม่ต้องขออนุมัติหากเป็นอาคารของสาขา","จัดทำสัญญาเช่าเองตามรูปแบบที่ต้องการ"],ans:1,
exp:"การนำทรัพย์สินของ ธ.ก.ส. ไปแสวงหาประโยชน์ต้องได้รับอนุมัติจากผู้มีอำนาจก่อน ต้องตรวจสอบกรรมสิทธิ์ สภาพกฎหมาย และขออนุมัติจากส่วนกลาง รวมถึงจัดทำสัญญาตามแบบที่ ธ.ก.ส. กำหนด เพื่อป้องกันปัญหาทางกฎหมายและการตรวจสอบ"},

// ===== นายหน้าประกันภัย =====
{id:11,cat:"นายหน้าประกันภัย",level:"จำ",q:"ธ.ก.ส. ดำเนินธุรกิจนายหน้าประกันภัยได้ภายใต้การกำกับดูแลของหน่วยงานใด?",
opts:["ธนาคารแห่งประเทศไทย (ธปท.)","สำนักงานคณะกรรมการกำกับและส่งเสริมการประกอบธุรกิจประกันภัย (คปภ.)","กระทรวงการคลัง","สำนักงาน ก.ล.ต."],ans:1,
exp:"การประกอบธุรกิจนายหน้าประกันภัยอยู่ภายใต้การกำกับดูแลของ คปภ. (สำนักงานคณะกรรมการกำกับและส่งเสริมการประกอบธุรกิจประกันภัย) ซึ่งออกกฎระเบียบ ให้ใบอนุญาต และกำกับดูแลการประกอบธุรกิจประกันภัยทุกประเภท"},
{id:12,cat:"นายหน้าประกันภัย",level:"จำ",q:"ผลิตภัณฑ์ประกันภัยที่ ธ.ก.ส. นำเสนอผ่านช่องทางนายหน้าหลักคือประเภทใด?",
opts:["ประกันชีวิตส่วนบุคคล","ประกันภัยพืชผลเกษตร ประกันชีวิตเกษตรกร และประกันอุบัติเหตุ","ประกันทรัพย์สินอุตสาหกรรม","ประกันภัยรถยนต์เชิงพาณิชย์"],ans:1,
exp:"ธ.ก.ส. เน้นผลิตภัณฑ์ประกันภัยที่สอดคล้องกับกลุ่มเป้าหมายหลักคือเกษตรกร ได้แก่ ประกันภัยพืชผล (ข้าว ยางพารา มันสำปะหลัง) ประกันชีวิตเกษตรกร และประกันอุบัติเหตุ เพื่อบริหารความเสี่ยงให้เกษตรกรลูกค้า"},
{id:13,cat:"นายหน้าประกันภัย",level:"เข้าใจ",q:"ความแตกต่างระหว่าง \"นายหน้าประกันชีวิต\" กับ \"ตัวแทนประกันชีวิต\" คืออะไร?",
opts:["นายหน้าทำงานให้บริษัทประกันเดียว ตัวแทนทำงานได้หลายบริษัท","นายหน้าทำงานเพื่อผลประโยชน์ของผู้เอาประกัน สามารถนำเสนอผลิตภัณฑ์จากหลายบริษัท ส่วนตัวแทนผูกพันกับบริษัทเดียว","ทั้งคู่มีหน้าที่เหมือนกันแต่ใช้ชื่อต่างกัน","นายหน้าต้องมีใบอนุญาต แต่ตัวแทนไม่ต้อง"],ans:1,
exp:"นายหน้าประกันภัย (Broker) ทำงานเพื่อผลประโยชน์ของลูกค้า สามารถนำเสนอและเปรียบเทียบผลิตภัณฑ์จากหลายบริษัทประกัน ขณะที่ตัวแทน (Agent) ผูกพันและทำงานแทนบริษัทประกันเพียงบริษัทเดียวหรือไม่กี่บริษัท"},
{id:14,cat:"นายหน้าประกันภัย",level:"ประยุกต์",q:"เกษตรกรลูกค้าถามว่าควรทำประกันภัยข้าวหรือไม่ เนื่องจากแปลงนาอยู่ในพื้นที่เสี่ยงน้ำท่วม พนักงานควรแนะนำอย่างไร?",
opts:["แนะนำให้ทำเนื่องจากพื้นที่เสี่ยงน้ำท่วมควรมีประกัน พร้อมอธิบายเงื่อนไขและความคุ้มครอง","บอกให้ตัดสินใจเองเพราะเป็นเรื่องส่วนตัว","แนะนำว่าไม่จำเป็น เนื่องจากภาครัฐมีโครงการช่วยเหลือเกษตรกรอยู่แล้ว","แนะนำประกันชีวิตแทนเพราะได้ผลตอบแทนมากกว่า"],ans:0,
exp:"พนักงานควรให้คำแนะนำที่เป็นประโยชน์ต่อลูกค้า โดยชี้ให้เห็นว่าพื้นที่เสี่ยงน้ำท่วมเป็นเหตุผลสำคัญที่ควรทำประกันภัยพืชผล พร้อมอธิบายความคุ้มครอง เบี้ยประกัน เงื่อนไขการเคลมอย่างครบถ้วน เพื่อให้ลูกค้าตัดสินใจได้อย่างมีข้อมูล"},
{id:15,cat:"นายหน้าประกันภัย",level:"วิเคราะห์",q:"สถานการณ์: บริษัทประกัน A เสนอค่าตอบแทน (Commission) สูงกว่าบริษัท B แต่ความคุ้มครองของ A ด้อยกว่า B สำหรับความต้องการของลูกค้า พนักงานควรทำอย่างไร?",
opts:["เลือกนำเสนอบริษัท A เพราะให้ Commission สูงกว่า","นำเสนอบริษัท B ที่ตอบโจทย์ลูกค้ามากกว่า พร้อมอธิบายเหตุผล","นำเสนอทั้งสองบริษัทโดยไม่แนะนำ ให้ลูกค้าเลือกเอง","ปฏิเสธการขายเพื่อหลีกเลี่ยงความขัดแย้งทางผลประโยชน์"],ans:1,
exp:"จรรยาบรรณนายหน้าประกันภัยกำหนดให้ต้องทำงานเพื่อผลประโยชน์ของลูกค้าเป็นหลัก ไม่ใช่ผลประโยชน์ของตนเอง การเลือกนำเสนอผลิตภัณฑ์ที่ตอบโจทย์ลูกค้าและอธิบายเหตุผลอย่างโปร่งใส คือแนวทางที่ถูกต้อง สร้างความไว้วางใจระยะยาว"},

// ===== สินเชื่อกลุ่มบุคคล (สช.39) =====
{id:16,cat:"สินเชื่อกลุ่มบุคคล",level:"จำ",q:"สินเชื่อกลุ่มบุคคลตาม สช.39 คือสินเชื่อที่ให้แก่กลุ่มบุคคลประเภทใด?",
opts:["เฉพาะเกษตรกรรายบุคคลที่รวมกลุ่ม","กลุ่มบุคคลที่รวมตัวกันเพื่อประกอบอาชีพหรือดำเนินกิจกรรมร่วมกัน ไม่ต้องจดทะเบียนเป็นนิติบุคคล","สหกรณ์การเกษตรและกลุ่มวิสาหกิจ","ข้าราชการและพนักงานรัฐที่รวมกลุ่ม"],ans:1,
exp:"สินเชื่อกลุ่มบุคคลตาม สช.39 ให้สินเชื่อแก่กลุ่มบุคคลที่รวมตัวกันโดยไม่จำเป็นต้องจดทะเบียนเป็นนิติบุคคล เพื่อประกอบอาชีพหรือดำเนินกิจกรรมร่วมกัน โดยสมาชิกค้ำประกันซึ่งกันและกัน"},
{id:17,cat:"สินเชื่อกลุ่มบุคคล",level:"จำ",q:"จำนวนสมาชิกขั้นต่ำของกลุ่มบุคคลที่จะขอสินเชื่อตาม สช.39 กำหนดไว้เท่าใด?",
opts:["3 คน","5 คน","10 คน","20 คน"],ans:1,
exp:"ตาม สช.39 กลุ่มบุคคลที่จะขอสินเชื่อต้องมีสมาชิกขั้นต่ำ 5 คนขึ้นไป เพื่อให้มีการค้ำประกันกันในกลุ่มที่มีนัยสำคัญ และสร้างแรงกดดันทางสังคมในการชำระคืน"},
{id:18,cat:"สินเชื่อกลุ่มบุคคล",level:"เข้าใจ",q:"หลักค้ำประกันหลักของสินเชื่อกลุ่มบุคคลตาม สช.39 คืออะไร?",
opts:["ที่ดินเป็นหลักประกัน","สมาชิกในกลุ่มค้ำประกันซึ่งกันและกัน (Joint Liability)","บุคคลภายนอกกลุ่มเป็นผู้ค้ำประกัน","ไม่ต้องมีหลักประกัน"],ans:1,
exp:"สินเชื่อกลุ่มบุคคลใช้หลักการ Joint Liability คือสมาชิกในกลุ่มค้ำประกันซึ่งกันและกัน ถ้าสมาชิกคนใดผิดนัด สมาชิกคนอื่นต้องร่วมรับผิดชอบ ซึ่งสร้างแรงจูงใจให้สมาชิกติดตามกันเองในกลุ่ม"},
{id:19,cat:"สินเชื่อกลุ่มบุคคล",level:"ประยุกต์",q:"กลุ่มแม่บ้านในชุมชนรวมตัว 8 คน ต้องการกู้เงินเพื่อซื้อวัตถุดิบทำผลิตภัณฑ์ OTOP ร่วมกัน พนักงานสินเชื่อควรพิจารณาจากข้อใดเป็นลำดับแรก?",
opts:["ความสามารถชำระหนี้ของสมาชิกแต่ละคนแยกกัน","ความเข้มแข็งและความเป็นปึกแผ่นของกลุ่ม ประวัติการทำงานร่วมกัน และความสามารถชำระหนี้ร่วม","จำนวนทรัพย์สินที่กลุ่มนำมาค้ำประกัน","ระยะเวลาที่กลุ่มก่อตั้งมา"],ans:1,
exp:"สำหรับสินเชื่อกลุ่มบุคคล ปัจจัยสำคัญที่สุดคือความเข้มแข็งของกลุ่ม ได้แก่ ความสามัคคี ประวัติการทำงานร่วมกัน การมีวัตถุประสงค์เดียวกัน และความสามารถในการสร้างรายได้ร่วมกันเพื่อชำระหนี้ เพราะหลักค้ำประกันคือการค้ำกันในกลุ่ม"},
{id:20,cat:"สินเชื่อกลุ่มบุคคล",level:"วิเคราะห์",q:"สถานการณ์: กลุ่มบุคคลขอสินเชื่อ พบว่าสมาชิก 2 ใน 6 คน มีประวัติค้างชำระสินเชื่อรายบุคคลมาก่อน แต่ปัจจุบันชำระปกติแล้ว กลุ่มมีศักยภาพดี ควรวิเคราะห์อย่างไร?",
opts:["ปฏิเสธทันทีเพราะสมาชิกบางคนมีประวัติค้างชำระ","พิจารณาทั้งปัจจัยลบ (ประวัติค้างชำระ) และปัจจัยบวก (ปัจจุบันชำระปกติ ศักยภาพกลุ่ม) อย่างรอบด้าน","อนุมัติทันทีเพราะกลุ่มโดยรวมมีศักยภาพดี","แนะนำให้ตัดสมาชิก 2 คนนั้นออกจากกลุ่มก่อน"],ans:1,
exp:"การวิเคราะห์สินเชื่อต้องพิจารณาอย่างรอบด้าน ประวัติค้างชำระในอดีตแต่ปัจจุบันปกติแล้วต้องนำมาวิเคราะห์พร้อมศักยภาพปัจจุบัน สาเหตุของการค้างชำระ ความเข้มแข็งของกลุ่ม และมาตรการติดตาม เพื่อตัดสินใจบนข้อมูลรอบด้าน ไม่ใช่ปฏิเสธหรืออนุมัติแบบตัดสินโดยง่าย"},

// ===== ธนาคารชุมชน (สช.68) =====
{id:21,cat:"ธนาคารชุมชน",level:"จำ",q:"โครงการธนาคารชุมชน (สช.68) ของ ธ.ก.ส. มีวัตถุประสงค์หลักคืออะไร?",
opts:["แข่งขันกับธนาคารพาณิชย์ในชุมชน","ส่งเสริมการออมและการเข้าถึงสินเชื่อของคนในชุมชน โดยใช้กลไกชุมชนบริหารจัดการ","ให้บริการรับฝากเงินแทน ธ.ก.ส. สาขา","สร้างสาขาย่อยของ ธ.ก.ส. ในชุมชนห่างไกล"],ans:1,
exp:"ธนาคารชุมชนมุ่งส่งเสริมให้ชุมชนพึ่งพาตนเองด้านการเงิน โดยการรวมตัวของสมาชิกในชุมชนเพื่อระดมทุน และให้บริการสินเชื่อแก่สมาชิก ธ.ก.ส. ทำหน้าที่สนับสนุน ส่งเสริม และกำกับ"},
{id:22,cat:"ธนาคารชุมชน",level:"จำ",q:"ใครเป็นผู้บริหารจัดการธนาคารชุมชน?",
opts:["พนักงาน ธ.ก.ส. ที่ได้รับมอบหมาย","คณะกรรมการที่มาจากสมาชิกในชุมชนเป็นผู้บริหาร","ผู้นำชุมชนโดยตำแหน่ง เช่น กำนัน ผู้ใหญ่บ้าน","หน่วยงานราชการในท้องถิ่น"],ans:1,
exp:"ธนาคารชุมชนบริหารโดยคณะกรรมการที่มาจากการเลือกตั้งของสมาชิกในชุมชน ซึ่งเป็นหัวใจสำคัญของโครงการ ชุมชนต้องบริหารจัดการตนเอง ธ.ก.ส. ทำหน้าที่เป็นพี่เลี้ยงและสนับสนุน"},
{id:23,cat:"ธนาคารชุมชน",level:"เข้าใจ",q:"บทบาทของ ธ.ก.ส. สาขาต่อธนาคารชุมชนในพื้นที่คืออะไร?",
opts:["บริหารจัดการโดยตรงแทนชุมชน","ให้การสนับสนุน ส่งเสริม ติดตาม และกำกับดูแลธนาคารชุมชนให้ดำเนินการถูกต้องตามระเบียบ","จัดหาเงินทุนทั้งหมดให้ธนาคารชุมชน","ตรวจสอบบัญชีธนาคารชุมชนแทนผู้ตรวจสอบอิสระ"],ans:1,
exp:"ธ.ก.ส. สาขามีบทบาทเป็น 'พี่เลี้ยง' คือให้การอบรม แนะนำการบริหารจัดการ ติดตามผลการดำเนินงาน และกำกับดูแลให้เป็นไปตามระเบียบ แต่ไม่เข้าไปแทรกแซงการตัดสินใจของคณะกรรมการชุมชน"},
{id:24,cat:"ธนาคารชุมชน",level:"ประยุกต์",q:"ธนาคารชุมชนในพื้นที่มีปัญหาหนี้เสียสูงขึ้น คณะกรรมการขอให้ ธ.ก.ส. สาขาช่วยเหลือ พนักงานควรดำเนินการอย่างไร?",
opts:["รับโอนหนี้เสียมาจัดการแทนทันที","ร่วมวิเคราะห์สาเหตุหนี้เสีย ให้คำแนะนำด้านการบริหารสินเชื่อและติดตามหนี้ โดยชุมชนยังคงรับผิดชอบด้วยตนเอง","ปล่อยให้ชุมชนจัดการเองเพราะเป็นเรื่องของชุมชน","เสนอให้ยุบธนาคารชุมชนและรวมเข้ากับ ธ.ก.ส."],ans:1,
exp:"บทบาทของ ธ.ก.ส. คือให้การสนับสนุนและถ่ายทอดความรู้ ไม่ใช่รับผิดชอบแทน พนักงานควรช่วยวิเคราะห์ปัญหา แนะนำแนวทางแก้ไข ฝึกอบรมทักษะ แต่ให้ชุมชนเป็นผู้ลงมือปฏิบัติและรับผิดชอบ เพื่อให้ชุมชนเข้มแข็งยั่งยืน"},
{id:25,cat:"ธนาคารชุมชน",level:"วิเคราะห์",q:"สถานการณ์: ธนาคารชุมชนในพื้นที่ปฏิบัติตามระเบียบ แต่ดอกเบี้ยที่เรียกเก็บจากสมาชิกสูงกว่าอัตราที่ ธ.ก.ส. กำหนดไว้ คณะกรรมการอ้างว่าเพื่อให้มีกำไรเลี้ยงองค์กร ควรจัดการอย่างไร?",
opts:["ยอมรับเพราะเป็นสิทธิ์ของชุมชนในการกำหนดอัตราดอกเบี้ยเอง","แจ้งให้คณะกรรมการทราบว่าเป็นการผิดระเบียบ ต้องปรับลดอัตราดอกเบี้ยให้ถูกต้อง พร้อมอธิบายวิธีบริหารกำไรที่ถูกต้อง","รายงานส่วนกลางทันทีและระงับการดำเนินงานธนาคารชุมชน","ไม่แทรกแซงเพราะธนาคารชุมชนบริหารโดยชุมชน"],ans:1,
exp:"แม้ธนาคารชุมชนจะบริหารโดยชุมชน แต่ต้องปฏิบัติตามระเบียบ ธ.ก.ส. ที่กำหนด การเก็บดอกเบี้ยเกินอัตรากำหนดผิดระเบียบและอาจผิดกฎหมาย พนักงานต้องแจ้งแก้ไขและให้คำแนะนำเรื่องการบริหารรายได้-รายจ่ายที่ถูกต้อง"},

// ===== เงินฝาก (เพิ่มเติม) =====
{id:26,cat:"เงินฝาก",level:"จำ",q:"เงินฝากประเภทใดที่ ธ.ก.ส. ถือว่า \"เงินฝากไม่มีการเคลื่อนไหว\" (Dormant Account)?",
opts:["บัญชีที่ไม่มีการฝากหรือถอนเกิน 1 ปี","บัญชีที่ไม่มีการฝากหรือถอนเกิน 5 ปีสำหรับออมทรัพย์","บัญชีที่มียอดคงเหลือต่ำกว่า 100 บาท","บัญชีที่ยังไม่ได้รับดอกเบี้ยประจำปี"],ans:1,
exp:"ตามกฎหมายธนาคารพาณิชย์และระเบียบ ธ.ก.ส. บัญชีออมทรัพย์หรือบัญชีกระแสรายวันที่ไม่มีการฝากหรือถอนเกิน 5 ปี จะถูกจัดเป็นบัญชีเงินฝากค้างนาน (Dormant Account) ซึ่งมีขั้นตอนพิเศษในการดำเนินการ"},
{id:27,cat:"เงินฝาก",level:"เข้าใจ",q:"การตรวจสอบ KYC (Know Your Customer) ในการเปิดบัญชีเงินฝากมีความสำคัญอย่างไร?",
opts:["เพื่อตรวจสอบว่าลูกค้ามีเงินฝากเพียงพอ","เพื่อยืนยันตัวตนลูกค้า ป้องกันการฟอกเงิน และปฏิบัติตามกฎหมายป้องกันและปราบปรามการฟอกเงิน","เพื่อประเมินความน่าเชื่อถือสำหรับการให้สินเชื่อในอนาคต","เพื่อเก็บข้อมูลทางการตลาดของลูกค้า"],ans:1,
exp:"KYC (Know Your Customer) เป็นข้อกำหนดตามกฎหมายป้องกันและปราบปรามการฟอกเงิน (AML/PMLA) ธนาคารต้องยืนยันตัวตนลูกค้า ทำความเข้าใจลักษณะธุรกรรม และประเมินความเสี่ยงเพื่อป้องกันการนำระบบการเงินไปใช้ในทางผิดกฎหมาย"},
{id:28,cat:"เงินฝาก",level:"วิเคราะห์",q:"สถานการณ์: ลูกค้าต้องการฝากเงินสดจำนวน 1.5 ล้านบาท แต่ไม่สามารถอธิบายแหล่งที่มาของเงินได้ชัดเจน พนักงานควรทำอย่างไร?",
opts:["รับฝากเงินตามปกติ เพราะลูกค้าสิทธิ์ฝากเงินได้","บันทึกธุรกรรมและรายงานธุรกรรมที่น่าสงสัย (STR) ต่อ ปปง. ตามกฎหมาย","ปฏิเสธการรับฝากและแจ้งลูกค้าว่ารับฝากไม่ได้","รับฝากแต่เปิดบัญชีใหม่แยกต่างหากจากบัญชีอื่น"],ans:1,
exp:"ตาม พ.ร.บ. ป้องกันและปราบปรามการฟอกเงิน ธนาคารและพนักงานมีหน้าที่รายงานธุรกรรมที่น่าสงสัย (STR - Suspicious Transaction Report) ต่อ ปปง. เมื่อพบธุรกรรมที่ผิดปกติ เช่น ฝากเงินสดจำนวนมากโดยไม่สามารถอธิบายแหล่งที่มาได้"},

// ===== ธุรกิจอิเล็กทรอนิกส์ (เพิ่มเติม) =====
{id:29,cat:"ธุรกิจอิเล็กทรอนิกส์",level:"จำ",q:"ระบบ A-Mobile ของ ธ.ก.ส. ใช้สำหรับอะไร?",
opts:["ระบบการจัดการสินเชื่อภายในสำนักงาน","แอปพลิเคชันสำหรับลูกค้าทำธุรกรรมธนาคารผ่านโทรศัพท์มือถือ","ระบบตรวจสอบสินทรัพย์ของ ธ.ก.ส.","การส่งข้อความแจ้งเตือนลูกค้าทาง SMS"],ans:1,
exp:"A-Mobile (BAAC Mobile) คือแอปพลิเคชัน Mobile Banking ของ ธ.ก.ส. สำหรับให้ลูกค้าทำธุรกรรมผ่านสมาร์ทโฟน เช่น โอนเงิน ชำระบิล ตรวจสอบยอด และบริการอื่นๆ โดยไม่ต้องเดินทางมาสาขา"},
{id:30,cat:"ธุรกิจอิเล็กทรอนิกส์",level:"เข้าใจ",q:"ระบบ CBS (Core Banking System) ของ ธ.ก.ส. คืออะไรและมีความสำคัญอย่างไร?",
opts:["ระบบสำรองข้อมูลฉุกเฉินของธนาคาร","ระบบธนาคารกลางที่รวมฐานข้อมูลลูกค้า การเงิน และธุรกรรมทั้งหมดไว้ในที่เดียว ทำให้ทุกสาขาเข้าถึงข้อมูลแบบ Real-time","ระบบสื่อสารภายในระหว่างสาขา","ระบบบริหารทรัพยากรบุคคลของ ธ.ก.ส."],ans:1,
exp:"CBS (Core Banking System) เป็นระบบหลักของธนาคารที่รวมฐานข้อมูลลูกค้า บัญชีเงินฝาก สินเชื่อ และธุรกรรมทั้งหมดไว้ในระบบเดียว ทำให้สาขาทุกแห่งเข้าถึงข้อมูลแบบ Real-time และสามารถให้บริการลูกค้าได้อย่างมีประสิทธิภาพ"},
{id:31,cat:"ธุรกิจอิเล็กทรอนิกส์",level:"ประยุกต์",q:"ลูกค้าแจ้งว่าถูกหักเงินจากบัญชีโดยไม่ได้ทำรายการ และสงสัยว่าถูกสแกมเมอร์ดูดเงิน พนักงานควรดำเนินการอย่างไรก่อน?",
opts:["แนะนำให้ลูกค้าไปแจ้งความที่สถานีตำรวจก่อน","อายัดบัญชีชั่วคราวเพื่อป้องกันความเสียหายเพิ่มเติม ตรวจสอบประวัติธุรกรรม และประสานหน่วยงานที่เกี่ยวข้อง","บอกว่าเป็นเรื่องของลูกค้าเองและต้องพิสูจน์ว่าไม่ได้ทำรายการ","รอให้ลูกค้าร้องเรียนเป็นลายลักษณ์อักษรก่อน"],ans:1,
exp:"เมื่อพบกรณีสงสัยถูกดูดเงิน ต้องดำเนินการด่วน คือ อายัดบัญชีชั่วคราวเพื่อหยุดความเสียหาย ตรวจสอบรายการธุรกรรมย้อนหลัง ประสานศูนย์ต่อต้านข่าวปลอม/DSI/ตำรวจ และแนะนำลูกค้าเรื่องการเปลี่ยน PIN/Password ทันที"},
{id:32,cat:"ธุรกิจอิเล็กทรอนิกส์",level:"วิเคราะห์",q:"สถานการณ์: ลูกค้าสูงอายุในชุมชนห่างไกลไม่สามารถใช้แอป A-Mobile ได้ แต่ต้องการชำระค่าไฟฟ้าและบิลต่างๆ ทางเลือกใดเหมาะสมที่สุดสำหรับลูกค้ากลุ่มนี้?",
opts:["แนะนำให้เดินทางมาชำระที่สาขาทุกครั้ง","แนะนำบริการผ่าน BAAC Agent (ตัวแทน ธ.ก.ส.) ในชุมชน หรือ Counter Service ที่ใกล้บ้าน","บังคับให้ลูกค้าเรียนรู้แอปโดยลงทะเบียน A-Mobile","แจ้งว่า ธ.ก.ส. ไม่มีบริการสำหรับลูกค้าสูงอายุ"],ans:1,
exp:"ธ.ก.ส. พัฒนาช่องทางหลากหลายเพื่อเข้าถึงลูกค้าทุกกลุ่ม บริการผ่าน BAAC Agent (ตัวแทน ธ.ก.ส.) ในชุมชนเป็นทางเลือกที่เหมาะสมสำหรับผู้สูงอายุและผู้ที่ไม่คุ้นเคยกับเทคโนโลยี ลดความจำเป็นในการเดินทางไกล"},

// ===== ค่าธรรมเนียม (เพิ่มเติม) =====
{id:33,cat:"ค่าธรรมเนียม",level:"จำ",q:"หากลูกค้าใช้ตู้ ATM ของ ธ.ก.ส. ถอนเงินต่างจังหวัดเกินกว่าจำนวนครั้งที่กำหนดฟรี จะถูกเรียกเก็บค่าธรรมเนียมเท่าใดต่อรายการ (โดยประมาณมาตรฐาน)?",
opts:["5 บาท","10 บาท","15 บาท","25 บาท"],ans:2,
exp:"ค่าธรรมเนียมถอนเงินผ่าน ATM ต่างจังหวัดที่เกินกว่าจำนวนครั้งฟรีที่กำหนด โดยทั่วไปอยู่ที่ประมาณ 15 บาทต่อรายการ ทั้งนี้อัตราอาจเปลี่ยนแปลงได้ตามประกาศของ ธ.ก.ส. ที่มีผลบังคับใช้"},
{id:34,cat:"ค่าธรรมเนียม",level:"เข้าใจ",q:"ค่าธรรมเนียมการโอนเงินผ่านระบบ Interbank (PromptPay/BAHTNET) แตกต่างจากการโอนเงินภายใน ธ.ก.ส. ด้วยกันอย่างไร?",
opts:["ไม่มีความแตกต่าง","การโอนภายใน ธ.ก.ส. มักไม่มีค่าธรรมเนียมหรือถูกกว่า ส่วนการโอน Interbank มีค่าธรรมเนียมตามประกาศ","การโอน Interbank ถูกกว่าเพราะรัฐบาลอุดหนุน","ค่าธรรมเนียมเท่ากันทุกประเภท"],ans:1,
exp:"การโอนเงินภายใน ธ.ก.ส. (ระหว่างสาขา ธ.ก.ส.) มักไม่มีค่าธรรมเนียมหรือต่ำมาก เพราะอยู่ในระบบเดียวกัน ขณะที่การโอนเงิน Interbank ไปยังธนาคารอื่นผ่านระบบ PromptPay, BAHTNET จะมีค่าธรรมเนียมตามที่ ธ.ก.ส. ประกาศ"},
{id:35,cat:"ค่าธรรมเนียม",level:"วิเคราะห์",q:"สถานการณ์: ลูกค้าร้องเรียนว่าถูกเก็บค่าธรรมเนียมธุรกรรม ATM ที่ไม่ได้รับแจ้งล่วงหน้า พนักงานควรจัดการอย่างไร?",
opts:["บอกว่าลูกค้าควรอ่านประกาศค่าธรรมเนียมเองก่อนใช้บริการ","ตรวจสอบข้อเท็จจริง อธิบายที่มาของค่าธรรมเนียมอย่างชัดเจน และพิจารณาคืนเงินหากเกิดจากความผิดพลาด","ปฏิเสธโดยอ้างว่าค่าธรรมเนียมถูกต้องตามระเบียบ","รับเรื่องร้องเรียนไว้แต่ไม่ดำเนินการต่อ"],ans:1,
exp:"การจัดการร้องเรียนต้องเริ่มจากการฟังและตรวจสอบข้อเท็จจริงอย่างเป็นกลาง อธิบายที่มาของค่าธรรมเนียมด้วยความเป็นมิตร หากพบว่าเป็นความผิดพลาดของธนาคารต้องคืนเงินและขอโทษ การจัดการร้องเรียนที่ดีสร้างความไว้วางใจและรักษาลูกค้า"},

// ===== CIF (เพิ่มเติม) =====
{id:36,cat:"CIF",level:"จำ",q:"CIF (Customer Information File) ใน ธ.ก.ส. ประกอบด้วยข้อมูลใดบ้างเป็นหลัก?",
opts:["เฉพาะข้อมูลทางการเงิน เช่น รายได้และทรัพย์สิน","ข้อมูลส่วนตัว ที่อยู่ อาชีพ ประวัติธุรกรรม และความสัมพันธ์กับ ธ.ก.ส.","เฉพาะข้อมูลประวัติสินเชื่อ","เฉพาะข้อมูลบัญชีเงินฝาก"],ans:1,
exp:"CIF ประกอบด้วยข้อมูลครบถ้วนของลูกค้า ได้แก่ ข้อมูลส่วนตัว (ชื่อ ที่อยู่ เบอร์โทร) อาชีพและรายได้ บัญชีเงินฝากและสินเชื่อทุกประเภท ประวัติธุรกรรม และข้อมูลการติดต่อ ทำให้พนักงานทุกสาขาสามารถเห็นภาพรวมของลูกค้าได้ครบถ้วน"},

let activeQ = [];
let answered = {};
let score = 0;

function startQuiz(){
  const cat = document.getElementById('filterCat').value;
  const lvl = document.getElementById('filterLvl').value;
  const n = document.getElementById('filterN').value;
  
  let pool = ALL_Q.filter(q => 
    (cat==='all' || q.cat===cat) && 
    (lvl==='all' || q.level===lvl)
  );
  
  pool = shuffle(pool);
  if(n!=='all') pool = pool.slice(0,parseInt(n));
  
  activeQ = pool;
  answered = {};
  score = 0;
  document.getElementById('scoreDisp').textContent = '0';
  document.getElementById('totalDisp').textContent = pool.length;
  document.getElementById('summary').style.display = 'none';
  renderQuiz();
}

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}

function renderQuiz(){
  const area = document.getElementById('quiz-area');
  if(!activeQ.length){area.innerHTML='<div style="text-align:center;padding:40px;color:#666">ไม่พบข้อสอบตามเงื่อนไขที่เลือก</div>';return;}
  
  const cats = [...new Set(activeQ.map(q=>q.cat))];
  let html='';
  cats.forEach(cat=>{
    const qs = activeQ.filter(q=>q.cat===cat);
    html+=`<div class="category-title">📂 ${cat}</div>`;
    qs.forEach((q,i)=>{
      const shuffledOpts = shuffle(q.opts.map((o,idx)=>({text:o,orig:idx})));
      const correctOrigIdx = q.ans;
      const correctNewIdx = shuffledOpts.findIndex(o=>o.orig===correctOrigIdx);
      
      html+=`<div class="q-card" id="qcard-${q.id}">
        <div class="q-header">
          <div class="q-num">${activeQ.indexOf(q)+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="q-meta">
          <span class="tag tag-cat">${q.cat}</span>
          <span class="tag tag-lvl ${q.level}">${q.level}</span>
        </div>
        <div class="options" id="opts-${q.id}">`;
      
      shuffledOpts.forEach((opt,oi)=>{
        html+=`<div class="opt" id="opt-${q.id}-${oi}" onclick="selectOpt(${q.id},${oi},${correctNewIdx})">${String.fromCharCode(65+oi)}. ${opt.text}</div>`;
      });
      
      html+=`</div>
        <button class="btn-submit" id="btn-${q.id}" onclick="submitQ(${q.id},${correctNewIdx})" disabled>ตอบ</button>
        <div class="explanation" id="exp-${q.id}"><strong>💡 เฉลย:</strong> ${q.exp}</div>
      </div>`;
    });
  });
  area.innerHTML=html;
}

function selectOpt(qid, optIdx, correctIdx){
  if(answered[qid]!==undefined) return;
  document.querySelectorAll(`#opts-${qid} .opt`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt-${qid}-${optIdx}`).classList.add('selected');
  document.getElementById(`btn-${qid}`).dataset.sel = optIdx;
  document.getElementById(`btn-${qid}`).disabled = false;
}

function submitQ(qid, correctIdx){
  const btn = document.getElementById(`btn-${qid}`);
  const sel = parseInt(btn.dataset.sel);
  if(isNaN(sel)) return;
  answered[qid] = sel;
  
  const opts = document.querySelectorAll(`#opts-${qid} .opt`);
  opts.forEach((el,i)=>{
    el.onclick = null;
    if(i===correctIdx) el.classList.add('correct');
    else if(i===sel && sel!==correctIdx) el.classList.add('wrong');
  });
  
  if(sel===correctIdx){
    score++;
    document.getElementById('scoreDisp').textContent=score;
    btn.textContent='✅ ถูกต้อง!';
    btn.style.background='#27ae60';
  } else {
    btn.textContent='❌ ผิด';
    btn.style.background='#e74c3c';
  }
  btn.disabled=true;
  document.getElementById(`exp-${qid}`).classList.add('show');
}

function showSummary(){
  const total = activeQ.length;
  const ans = Object.keys(answered).length;
  const pct = total ? Math.round(score/total*100) : 0;
  
  const byLevel = {};
  const byLevelTotal = {};
  activeQ.forEach(q=>{
    byLevelTotal[q.level]=(byLevelTotal[q.level]||0)+1;
    if(answered[q.id]!==undefined){
      const correctNewIdx = getCorrectIdx(q.id);
      if(answered[q.id]===correctNewIdx){
        byLevel[q.level]=(byLevel[q.level]||0)+1;
      }
    }
  });
  
  document.getElementById('sumScore').textContent=`${score}/${total} (${pct}%)`;
  let grid='';
  ['จำ','เข้าใจ','ประยุกต์','วิเคราะห์'].forEach(l=>{
    const t=byLevelTotal[l]||0;
    const s=byLevel[l]||0;
    if(t>0) grid+=`<div class="s-item"><div class="s-val">${s}/${t}</div><div class="s-lbl">ระดับ${l}</div></div>`;
  });
  
  const byCat={};const byCatT={};
  activeQ.forEach(q=>{
    byCatT[q.cat]=(byCatT[q.cat]||0)+1;
    if(answered[q.id]!==undefined){
      const correctNewIdx=getCorrectIdx(q.id);
      if(answered[q.id]===correctNewIdx) byCat[q.cat]=(byCat[q.cat]||0)+1;
    }
  });
  Object.keys(byCatT).forEach(c=>{
    grid+=`<div class="s-item"><div class="s-val">${byCat[c]||0}/${byCatT[c]}</div><div class="s-lbl">${c}</div></div>`;
  });
  
  document.getElementById('sumGrid').innerHTML=grid;
  document.getElementById('summary').style.display='block';
  document.getElementById('summary').scrollIntoView({behavior:'smooth'});
}

const _correctMap = {};
function getCorrectIdx(qid){return _correctMap[qid]||0;}

window.onload = ()=>{startQuiz();}
</script>
