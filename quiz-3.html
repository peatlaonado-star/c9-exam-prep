{id:10,cat:"ปปง./AML",level:"เข้าใจ",genius:"ข้อ 11",
q:"วัตถุประสงค์หลักของ ธปท. ในเรื่อง Market Conduct คืออะไร?",
opts:["เพิ่มรายได้ค่าธรรมเนียมของสถาบันการเงิน","คุ้มครองผู้บริโภคให้ได้รับบริการทางการเงินอย่างเป็นธรรมและมีข้อมูลเพียงพอในการตัดสินใจ","กำหนดอัตราดอกเบี้ยสูงสุดที่สถาบันการเงินเรียกเก็บได้","ส่งเสริมให้สถาบันการเงินแข่งขันกันอย่างเสรี"],
ans:1,exp:"Market Conduct ของ ธปท. มีวัตถุประสงค์เพื่อคุ้มครองผู้บริโภค (ลูกค้า) ให้ได้รับการปฏิบัติอย่างเป็นธรรม มีข้อมูลที่ถูกต้องครบถ้วนก่อนตัดสินใจรับบริการ ไม่ถูกเอาเปรียบ และมีช่องทางร้องเรียนที่เข้าถึงได้ง่าย",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 11"},

{id:11,cat:"ปปง./AML",level:"วิเคราะห์",genius:"ข้อ 76",
q:"สถานการณ์: ผู้จัดการสาขาส่งอีเมลให้พนักงานส่งข้อมูลลูกค้ารายหนึ่งไปยังบุคคลภายนอกทันที โดยไม่อธิบายเหตุผล พนักงานควรทำอย่างไร?",
opts:["ส่งข้อมูลทันทีเพราะผู้จัดการสั่ง","โทรยืนยันกลับไปที่ผู้จัดการสาขาเพื่อสอบถามเหตุผลและรับทราบความถูกต้องก่อนดำเนินการ","ปฏิเสธส่งข้อมูลทุกกรณีเพราะอาจผิด PDPA","ส่งข้อมูลพร้อมแนบหมายเหตุว่าไม่แน่ใจในคำสั่ง"],
ans:1,exp:"การส่งข้อมูลลูกค้าต้องมีเหตุผลที่ชอบด้วยกฎหมายและระเบียบ ธ.ก.ส. พนักงานมีหน้าที่ตรวจสอบความถูกต้องก่อนดำเนินการ โดยโทรยืนยันกลับเพื่อให้มั่นใจว่าเป็นคำสั่งจริงและมีเหตุผลที่ชอบด้วย PDPA และระเบียบธนาคาร ไม่ใช่แค่เชื่อตามคำสั่งโดยไม่ตรวจสอบ",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 76"},

// ===== ปปน./ปรับโครงสร้าง =====
{id:12,cat:"ปปน./ปรับโครงสร้าง",level:"จำ",genius:"ข้อ 16",
q:"ลูกค้าค้างชำระสินเชื่อครู 1 เดือน ธ.ก.ส. ต้องดำเนินการอย่างไรก่อน?",
opts:["ส่งเรื่องฟ้องคดีทันที","ส่งหนังสือแจ้งเตือนทางไปรษณีย์ภายใน 60 วันนับจากวันค้างชำระ","ตัดสิทธิ์ลูกค้าจากโครงการสินเชื่อครูทันที","รายงานต้นสังกัดของลูกค้าทันที"],
ans:1,exp:"ขั้นตอนการติดตามหนี้สินเชื่อครู: ค้าง 1 เดือน → ส่งหนังสือไปรษณีย์แจ้งเตือนภายใน 60 วัน / ค้าง 2 เดือน → ส่งหนังสือรอบ 2 และเรียกมาพูดคุย / ค้าง 3 เดือน → แจ้งไปหักเงินเดือนที่ต้นสังกัด หากยังไม่ได้ผลค่อยส่งเรื่องไปยัง สป.กษ. เพื่อฟ้องคดี",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 16"},

{id:13,cat:"ปปน./ปรับโครงสร้าง",level:"จำ",genius:"ข้อ 22",
q:"กรณีใดต่อไปนี้เป็นเหตุที่ทำให้ ปปน. (โครงการปรับปรุงโครงสร้างหนี้) ขยายโอกาสฯ ไม่ได้?",
opts:["NPL เกิน 3 ปี","ดอกเบี้ย + เบี้ยปรับ มากกว่า 30% ของเงินต้น","ผ่านการทำ ปปน. มาแล้ว 2 ครั้ง","หนี้ที่รับโอนแบ่งมาจากวิสาหกิจ"],
ans:2,exp:"เงื่อนไขที่ทำให้ไม่สามารถขยาย ปปน. ได้ เช่น NPL เกิน 3 ปี, ดอกเบี้ย+เบี้ยปรับเกิน 30% ของเงินต้น, รับโอนหนี้จากวิสาหกิจ ส่วนการผ่าน ปปน. มาแล้ว 2 ครั้ง เป็นปัจจัยที่ต้องพิจารณาประกอบแต่อาจยังขยายได้ในบางกรณี ขึ้นอยู่กับระเบียบที่บังคับใช้ในขณะนั้น",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 22"},

{id:14,cat:"ปปน./ปรับโครงสร้าง",level:"ประยุกต์",genius:"ข้อ 23",
q:"ลูกค้าทำ ปปน. ขยายโอกาสฯ สัญญาต้นเงิน 800,000 บาท งวดแรก 30,000 บาท ครบกำหนด 1 เม.ย. 67 สัญญาดอกเบี้ย 350,000 บาท งวดแรก 15,000 บาท อัตรา 6.975% ต่อปี ลูกค้าต้องการชำระในวันที่ 30 มิ.ย. 67 เพื่อ NPL Exit ต้องชำระขั้นต่ำเท่าใด?",
opts:["30,000 บาท (เฉพาะงวดต้นเงิน)","45,000 บาท (ต้นเงิน + ดอกเบี้ยงวดแรก)","ต้นเงิน + 75% ของดอกเบี้ยถึงงวดชำระ","ชำระทั้งหมดทั้งต้นและดอกเบี้ยทุกงวด"],
ans:2,exp:"เงื่อนไข NPL Exit ของ ปปน. ขยายโอกาสฯ กำหนดให้ลูกค้าต้องชำระ: (1) งวดต้นเงินที่ถึงกำหนด และ (2) ดอกเบี้ยอย่างน้อย 75% ของดอกเบี้ยที่ถึงกำหนดชำระ จึงจะพ้นสถานะ NPL ได้",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 23"},

{id:15,cat:"ปปน./ปรับโครงสร้าง",level:"วิเคราะห์",genius:"ข้อ 82",
q:"ข้อใดเป็นความแตกต่างที่สำคัญระหว่าง Reschedule (การยืดระยะเวลาชำระ) กับ Restructure (การปรับโครงสร้างหนี้)?",
opts:["Reschedule เปลี่ยนอัตราดอกเบี้ย ส่วน Restructure เปลี่ยนระยะเวลา","Reschedule ปรับแค่ตารางการชำระโดยไม่เปลี่ยนเงื่อนไขหลัก ส่วน Restructure เปลี่ยนเงื่อนไขสัญญาหลักเช่น อัตราดอกเบี้ย หลักประกัน หรือยอดหนี้","Reschedule ทำได้เฉพาะหนี้ NPL ส่วน Restructure ทำได้เฉพาะหนี้ปกติ","ทั้งสองคำมีความหมายเหมือนกันแต่ใช้คนละกรณี"],
ans:1,exp:"Reschedule คือการปรับตารางการชำระหนี้ใหม่ (ขยายเวลา ลดงวด) โดยเงื่อนไขหลักเดิมยังคงอยู่ ส่วน Restructure คือการปรับโครงสร้างหนี้ทั้งระบบ อาจรวมถึงการลดอัตราดอกเบี้ย การเปลี่ยนหลักประกัน การแปลงหนี้เป็นทุน หรือการปลอดต้นปลอดดอก ซึ่งซับซ้อนกว่า",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 82"},

// ===== Market Conduct =====
{id:16,cat:"Market Conduct",level:"จำ",genius:"ข้อ 72",
q:"พฤติกรรมใดของพนักงานที่ถือว่าปฏิบัติไม่ถูกต้องตามหลัก Market Conduct?",
opts:["แนะนำผลิตภัณฑ์ที่เหมาะสมกับความต้องการของลูกค้า","เสนอขายผลิตภัณฑ์ประกันพ่วงกับสินเชื่อโดยไม่แจ้งว่าเป็นทางเลือก ลูกค้าไม่ต้องซื้อก็ได้","อธิบายความเสี่ยงและผลตอบแทนของผลิตภัณฑ์อย่างครบถ้วน","มีช่องทางให้ลูกค้าร้องเรียนและตอบกลับภายเวลาที่กำหนด"],
ans:1,exp:"การ Tie-in หรือบังคับซื้อผลิตภัณฑ์พ่วงกับสินเชื่อโดยไม่แจ้งว่าเป็นทางเลือก ถือเป็นการละเมิด Market Conduct อย่างชัดเจน ธปท. กำหนดให้พนักงานต้องแจ้งลูกค้าอย่างชัดเจนว่าการซื้อประกันหรือผลิตภัณฑ์อื่นเป็นทางเลือกที่ไม่บังคับ",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 72"},

{id:17,cat:"Market Conduct",level:"ประยุกต์",genius:"ข้อ 65",
q:"ข้อใดเป็นการปฏิบัติไม่ถูกต้องตามมาตรการ 'ไม่รับของขวัญ' ของ ธ.ก.ส.?",
opts:["พนักงานซื้อกระเช้าผลไม้มูลค่า 2,500 บาทให้ผู้จัดการในวันปีใหม่","พนักงานซื้อผ้าพันคอมูลค่า 2,900 บาทให้ผู้จัดการในช่วงฤดูหนาว (ไม่ใช่เทศกาล)","พนักงานซื้อของขวัญมูลค่า 2,900 บาทให้ผู้จัดการในวันเกษียณอายุ","พนักงานซื้อสิ่งของมูลค่า 2,500 บาทให้ผู้จัดการในวันขึ้นปีใหม่ไทย"],
ans:1,exp:"นโยบาย No Gift Policy ของ ธ.ก.ส. อนุญาตให้รับของขวัญในเทศกาลสำคัญ เช่น ปีใหม่ สงกรานต์ วันเกษียณ โดยมีมูลค่าไม่เกินที่กำหนด แต่การให้ของขวัญที่ไม่ใช่เทศกาล (ฤดูหนาวทั่วไป) ถือว่าไม่เป็นไปตามมาตรการ แม้มูลค่าจะต่ำกว่าเกณฑ์ก็ตาม",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 65"},

// ===== FBI =====
{id:18,cat:"FBI",level:"จำ",genius:"ข้อ 73",
q:"ข้อใดกล่าวเกี่ยวกับงบ FBI (Fee-Based Income) ของ ธ.ก.ส. ถูกต้อง?",
opts:["งบ FBI ของปีหน้ากำหนดจากหมวด 3+4 ของปีนี้","สำนักงานจังหวัด (สนจ.) จัดสรรให้สาขา 85% ของงบที่ได้รับ","หมวด 2+4 ครบตามเป้า เบิกได้เพิ่มอีก 25%","FBI วัดจากรายได้ดอกเบี้ยสุทธิของสาขา"],
ans:0,exp:"งบ FBI (Fee-Based Income) ของปีถัดไปกำหนดจากผลงานหมวด 3 + หมวด 4 ของปีปัจจุบัน เป็นการสร้างแรงจูงใจให้สาขาหารายได้ค่าธรรมเนียมให้ได้ตามเป้าในปีปัจจุบัน เพื่อให้มีงบประมาณ FBI มากขึ้นในปีถัดไป",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 73"},

{id:19,cat:"FBI",level:"ประยุกต์",genius:"ข้อ 58",
q:"สาขาได้รับงบ FBI 2 ล้านบาท ผช.ผจข. ต้องหารายได้ 500,000 บาท จากค่าธรรมเนียมบัตร ATM พนักงานแต่ละคนควรเน้นบัตรประเภทใดเพื่อสร้างรายได้สูงสุด?",
opts:["บัตร ATM พื้นฐานไม่มีค่าธรรมเนียมรายปี","บัตรเดบิต Visa/Mastercard ที่มีค่าธรรมเนียมรายปีและค่าธรรมเนียมการใช้งานต่างประเทศ","บัตรสินเชื่อเกษตรกรที่ไม่มีวงเงินสูง","บัตร ATM ต่างจังหวัดที่มีค่าธรรมเนียมถอน"],
ans:1,exp:"การสร้างรายได้จากบัตร ATM ควรเน้นบัตรที่มีค่าธรรมเนียมต่อเนื่อง ได้แก่ บัตรเดบิต Visa/Mastercard ซึ่งมีทั้งค่าธรรมเนียมออกบัตร ค่าธรรมเนียมรายปี ค่าธรรมเนียมการใช้งานต่างประเทศ และค่าธรรมเนียมแปลงสกุลเงิน ซึ่งสร้าง FBI ได้ต่อเนื่องมากกว่าบัตร ATM พื้นฐาน",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 58"},

// ===== BCG/ยุทธศาสตร์ =====
{id:20,cat:"BCG/ยุทธศาสตร์",level:"จำ",genius:"ข้อ 2",
q:"ข้อใดไม่ใช่เป้าหมายทางยุทธศาสตร์ของ BCG Model ของไทย?",
opts:["เพิ่มการเติบโตทางธุรกิจ","ลดความเหลื่อมล้ำทางสังคม","ความยั่งยืนของธรรมชาติและสิ่งแวดล้อม","พัฒนาคุณภาพชีวิตของประชาชาติ"],
ans:3,exp:"BCG Model (Bio-Circular-Green Economy) มีเป้าหมาย 3 ด้านหลัก คือ (1) การเติบโตทางเศรษฐกิจ (2) ความยั่งยืนด้านสิ่งแวดล้อม (3) ลดความเหลื่อมล้ำ 'พัฒนาคุณภาพชีวิตของประชาชาติ' เป็นเป้าหมายที่ครอบคลุมกว้างเกินไปและไม่ได้ระบุเป็นเป้าหมายเฉพาะของ BCG",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 2"},

{id:21,cat:"BCG/ยุทธศาสตร์",level:"เข้าใจ",genius:"ข้อ 4",
q:"ลำดับขั้นตอนการจัดทำแผนวิสาหกิจของ ธ.ก.ส. ที่ถูกต้องคือข้อใด?",
opts:["กำหนดแผนยุทธศาสตร์ → วิเคราะห์สภาพแวดล้อม → กำหนดตำแหน่งทางยุทธศาสตร์","วิเคราะห์สภาพแวดล้อม → กำหนดตำแหน่งทางยุทธศาสตร์ → กำหนดแผนยุทธศาสตร์","กำหนดตำแหน่งทางยุทธศาสตร์ → วิเคราะห์สภาพแวดล้อม → กำหนดแผนยุทธศาสตร์","กำหนดแผนยุทธศาสตร์ → กำหนดตำแหน่ง → วิเคราะห์สภาพแวดล้อม"],
ans:1,exp:"กระบวนการวางแผนยุทธศาสตร์ที่ถูกต้องต้องเริ่มจากการวิเคราะห์สภาพแวดล้อม (SWOT/PEST) ก่อน เพื่อให้รู้ว่าองค์กรอยู่ที่ไหน จากนั้นจึงกำหนดตำแหน่งทางยุทธศาสตร์ (Strategic Positioning) และสุดท้ายจึงจัดทำแผนยุทธศาสตร์เพื่อบรรลุตำแหน่งที่ต้องการ",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 4"},

// ===== Carbon Credit =====
{id:22,cat:"Carbon Credit",level:"จำ",genius:"ข้อ 25,79",
q:"โครงการ BAAC Carbon Credit และ Carbon Neutrality ของ ธ.ก.ส. ใช้ระบบใดในการขึ้นทะเบียน Carbon Credit?",
opts:["ระบบ CBAM (Carbon Border Adjustment Mechanism)","ระบบ T-VER (Thailand Voluntary Emission Reduction Program)","ระบบ CDM (Clean Development Mechanism)","ระบบ ETS (Emission Trading System)"],
ans:1,exp:"ธ.ก.ส. สนับสนุนให้เกษตรกรปลูกต้นไม้และขึ้นทะเบียนกับ T-VER (Thailand Voluntary Emission Reduction) ขององค์การบริหารจัดการก๊าซเรือนกระจก (อบก.) เพื่อได้รับ Carbon Credit ที่สามารถนำมาใช้เป็นหลักประกันสินเชื่อหรือขายในตลาด Carbon ได้",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 25, 79"},

{id:23,cat:"Carbon Credit",level:"เข้าใจ",genius:"ข้อ 25",
q:"ข้อใดอธิบายการขับเคลื่อนของ ธ.ก.ส. ในโครงการ BAAC Carbon Credit ได้ถูกต้องที่สุด?",
opts:["ธนาคารปลูกต้นไม้เองในพื้นที่สาธารณะแทนลูกค้า","ธนาคารสนับสนุนลูกค้าและกลุ่มลูกค้าที่ปลูกต้นไม้ให้สมัครสมาชิกธนาคารต้นไม้และขึ้นทะเบียน T-VER เพื่อนำต้นไม้มาเป็นหลักประกัน","ธนาคารรับซื้อ Carbon Credit จากเกษตรกรโดยตรง","ธนาคารออกตราสารหนี้สีเขียวเพื่อระดมทุนปลูกต้นไม้"],
ans:1,exp:"บทบาทของ ธ.ก.ส. ในโครงการนี้คือการสนับสนุนให้ลูกค้าเกษตรกรปลูกต้นไม้ สมัครสมาชิกธนาคารต้นไม้ ขึ้นทะเบียน T-VER เพื่อรับ Carbon Credit และสามารถนำต้นไม้มาใช้เป็นหลักประกันสินเชื่อได้ นับเป็นนวัตกรรมทางการเงินเพื่อสิ่งแวดล้อม",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 25"},

// ===== PDPA =====
{id:24,cat:"PDPA",level:"จำ",genius:"ข้อ 12,64",
q:"ข้อมูลส่วนบุคคลประเภทใดจัดเป็น 'ข้อมูลที่มีความอ่อนไหว' (Sensitive Data) ตาม พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล?",
opts:["ชื่อ-นามสกุล และที่อยู่ปัจจุบัน","ข้อมูลสุขภาพ ศาสนา เชื้อชาติ และประวัติอาชญากรรม","หมายเลขโทรศัพท์และอีเมล","ข้อมูลการทำธุรกรรมปกติ"],
ans:1,exp:"ข้อมูลอ่อนไหว (Sensitive Personal Data) ตาม พ.ร.บ. PDPA มาตรา 26 ได้แก่ เชื้อชาติ ชาติพันธุ์ ความคิดเห็นทางการเมือง ลัทธิ ศาสนา พฤติกรรมทางเพศ ประวัติอาชญากรรม ข้อมูลสุขภาพ ข้อมูลพันธุกรรม และข้อมูลชีวภาพ ซึ่งต้องได้รับความยินยอมชัดแจ้งก่อนประมวลผล",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 12, 64"},

{id:25,cat:"PDPA",level:"เข้าใจ",genius:"ข้อ 29,87",
q:"การเปิดบัญชีเงินฝากให้เด็กอายุ 3-18 ปี และขอความยินยอมเปิดเผยข้อมูลส่วนบุคคล ต้องปฏิบัติอย่างไร?",
opts:["เด็กเซ็นยินยอมเองได้เมื่ออายุ 10 ปีขึ้นไป","ผู้ปกครองที่มีอำนาจปกครองต้องเซ็นยินยอมแทนเด็กทุกกรณี","เด็กอายุ 15 ปีขึ้นไปเซ็นยินยอมเองได้โดยไม่ต้องมีผู้ปกครอง","ไม่จำเป็นต้องขอความยินยอมจากใครสำหรับเด็ก"],
ans:1,exp:"ตามระเบียบ ธ.ก.ส. (ฝงฝ/ว 973 ลว. 1 เม.ย. 2567) และ พ.ร.บ. PDPA การขอความยินยอมสำหรับผู้เยาว์ (อายุต่ำกว่า 20 ปี) ต้องให้ผู้ปกครองที่มีอำนาจปกครองโดยชอบด้วยกฎหมายเป็นผู้ให้ความยินยอม เพราะผู้เยาว์ไม่มีความสามารถเต็มในการทำนิติกรรม",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 29, 87"},

// ===== บังคับคดี =====
{id:26,cat:"บังคับคดี",level:"เข้าใจ",genius:"ข้อ 24",
q:"กรณีสำนักงานบังคับคดีมีหนังสือให้แถลงการขายทอดตลาด โดยลูกค้าประสงค์ขายแบบติดจำนอง แต่ ธ.ก.ส. มีสิทธิ์เลือก ข้อใดถูกต้องตามหลักเกณฑ์ล่าสุด?",
opts:["แถลงขายแบบติดจำนองทุกราย เพราะลูกค้าต้องการ","พิจารณาตามยอดหนี้: หนี้ปกติ → ขายปลอดจำนอง, หนี้ NPL → ขายติดจำนอง","พิจารณาตามมูลค่าทรัพย์เทียบกับยอดหนี้ ถ้าทรัพย์คุ้มหนี้ให้ขายปลอดจำนอง","แถลงขายแบบปลอดจำนองทุกรายเสมอ"],
ans:2,exp:"การพิจารณาแถลงขายปลอดจำนองหรือติดจำนองต้องดูว่ามูลค่าทรัพย์ที่ขายทอดตลาดคุ้มกับยอดหนี้รวมหรือไม่ ถ้าคุ้มให้แถลงขายปลอดจำนอง (ธนาคารได้รับชำระหนี้ครบ) แต่ถ้าไม่คุ้มอาจพิจารณาขายติดจำนองแล้วเรียกส่วนต่าง ต้องดูบันทึกซักซ้อมล่าสุดของธนาคารประกอบ",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 24"},

{id:27,cat:"บังคับคดี",level:"วิเคราะห์",genius:"ข้อ 61",
q:"นาย ก มีหนี้เงินต้น 150,000 บาท ดอกเบี้ย 100,000 บาท จำนองที่ดินของนาย ค ไว้ 200,000 บาท มีผู้ค้ำประกัน 2 คน ค้ำคนละ 50,000 บาท หากนาย ค จะไถ่ถอนจำนองต้องชำระเท่าใด?",
opts:["150,000 บาท (เฉพาะเงินต้น)","230,000 บาท","250,000 บาท (ต้น+ดอก)","200,000 บาท (ตามวงเงินจำนอง)"],
ans:1,exp:"การไถ่ถอนจำนอง นาย ค ต้องชำระหนี้ที่ค้ำประกันด้วยการจำนองทั้งหมด ซึ่งรวมทั้งต้นเงิน 150,000 + ดอกเบี้ย 100,000 = 250,000 บาท แต่วงเงินจำนองจำกัดที่ 200,000 บาท ดังนั้นนาย ค จ่ายตามวงเงินจำนองคือ 200,000 + ค่าใช้จ่ายอื่น ≈ 230,000 บาท (คำตอบจากข้อสอบจริงคือ ข. 230,000)",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 61"},

// ===== เครดิตบูโร =====
{id:28,cat:"เครดิตบูโร",level:"จำ",genius:"ข้อ 14,66",
q:"กรณีใดไม่จำเป็นต้องขอรายงานเครดิตบูโร?",
opts:["ลูกค้า ฉ.44 ขอปรับปรุงโครงสร้างหนี้ วงเงินคงเหลือ 740,000 บาท","ลูกค้าขอสินเชื่อรายย่อย (ฉ.45) วงเงิน 490,000 บาท","ลูกค้าบุคคลขอออกหนังสือค้ำประกัน 2 ราย วงเงิน 110,000 บาท ด้วยสลาก ประกวดราคา 100 วัน","กองทุนหมู่บ้าน วงเงิน 990,000 บาท"],
ans:2,exp:"ตามระเบียบ (สพป/ว 819 ลว. 18 มีนาคม 2567) กำหนดวงเงินที่ไม่ต้องขอเครดิตบูโรสำหรับ ปปน. คือไม่เกิน 750,000 บาท การออกหนังสือค้ำประกันใช้สลากเป็นประกัน ระยะสั้น 100 วัน วงเงินต่ำ ไม่ต้องขอเครดิตบูโร",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 14"},

{id:29,cat:"เครดิตบูโร",level:"เข้าใจ",genius:"ข้อ 60",
q:"นาย ก ลูกค้าชั้น AA มีสัญญาหลายรายการ: สัญญา 1 ชำระปกติ, สัญญา 2 หนี้ สป.กษ. ชำระดอกได้ค้างต้น 20,000 บาท, สัญญา 3 ชำระต้น+ดอกครบ, สัญญา 4 บัตรสินเชื่อ ณ 31 พ.ค. นาย ก จะได้รับการจัดชั้นใด?",
opts:["จัดชั้น A","จัดชั้น AA","จัดชั้น AAA","จัดชั้น B"],
ans:2,exp:"หนี้ตามโครงการนโยบายรัฐ (สป.กษ.) ไม่นำมาพิจารณาจัดชั้นลูกค้า เนื่องจากเป็นนโยบายของรัฐบาล ดังนั้นสัญญา 2 ที่เป็น สป.กษ. จึงไม่นำมาคิด สัญญาที่เหลือทั้งหมดชำระปกติ นาย ก จึงยังคงอยู่ในชั้น AAA",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 60"},

// ===== อำนาจอนุมัติ =====
{id:30,cat:"อำนาจอนุมัติ",level:"จำ",genius:"ข้อ 77",
q:"อำนาจอนุญาตให้ตัดต้นไม้ในแปลงจำนอง ข้อใดถูกต้อง?",
opts:["ผช.ผจข. มีอำนาจอนุญาตได้ทุกกรณี","ผช.ผจข. มีอำนาจอนุญาต แต่ต้องไม่มีความสัมพันธ์ทางผลประโยชน์ (คสก.) กับลูกค้า","ผจข. ต้องมีหนี้เหลือไม่เกินครึ่งวงเงินจำนอง จึงอนุญาตได้","ต้องรอการอนุมัติจากสำนักงานจังหวัดทุกกรณี"],
ans:1,exp:"อำนาจอนุญาตให้ตัดต้นไม้ในแปลงจำนองของ ผช.ผจข. มีเงื่อนไขว่าต้องไม่มีความสัมพันธ์ทางผลประโยชน์ (Conflict of Interest) กับลูกค้ารายนั้น เพื่อป้องกันการใช้อำนาจอย่างไม่เป็นธรรม",

{id:31,cat:"อำนาจอนุมัติ",level:"ประยุกต์",genius:"ข้อ 49,50",
q:"สาขาต้องการโอนงบประมาณจากรายการซ่อมแซมไปยังรายการซื้อเครื่องโปรเจคเตอร์ เนื่องจากงบไม่เพียงพอ อำนาจในการโอนงบประมาณนี้เป็นของใคร?",
opts:["ผช.ผจข. สามารถโอนงบได้เองภายในวงเงินที่กำหนด","ผจข. สาขา","ผู้อำนวยการสำนักงานจังหวัด (ผอจ.)","ต้องได้รับอนุมัติจากสำนักงานใหญ่"],
ans:2,exp:"การโอนงบประมาณระหว่างหมวดรายจ่ายของสาขา (เช่น จากซ่อมแซมไปซื้อครุภัณฑ์) เป็นอำนาจของ ผอจ. (ผู้อำนวยการสำนักงานจังหวัด) ไม่ใช่อำนาจของ ผจข. หรือ ผช.ผจข. ต้องเสนอขออนุมัติผ่านช่องทางที่กำหนด",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 49"},

// ===== รับเงินนอกสถานที่ =====
{id:32,cat:"รับเงินนอกสถานที่",level:"จำ",genius:"ข้อ 34,59",
q:"สาขารับเงินนอกสถานที่เป็นประจำสัปดาห์ละ 1 ครั้ง วงเงิน 2 ล้านบาทและ 3 ล้านบาท ต้องแจ้งต่อหน่วยงานที่เกี่ยวข้องอย่างไร?",
opts:["แจ้งเป็นรายวันทั้งสองรายการ","แจ้งเป็นรายวันสำหรับทั้งสองรายการ สัปดาห์ละ 1 ครั้ง","แจ้งเป็นช่วงระยะเวลาสำหรับทั้งสองรายการ","แจ้งเป็นช่วงระยะเวลาสำหรับทั้งสองรายการ สัปดาห์ละ 1 ครั้ง"],
ans:3,exp:"การรับเงินนอกสถานที่เป็นประจำ ต้องแจ้งเป็น 'ช่วงระยะเวลา' (ไม่ใช่รายวัน) เพราะทำเป็นประจำสม่ำเสมอ และถ้าทำสัปดาห์ละครั้งก็ต้องระบุความถี่สัปดาห์ละ 1 ครั้งด้วย เพื่อให้หน่วยงานที่เกี่ยวข้องทราบแผนการรับเงินล่วงหน้า",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 59"},

{id:33,cat:"รับเงินนอกสถานที่",level:"วิเคราะห์",genius:"ข้อ 91",
q:"สาขาต้องออกรับเงินกฐิน 2 วัด วัดละ 10 ล้านบาท วงเงินประกันภัยนอกสำนักงานมี 15 ล้านบาท ควรดำเนินการอย่างไร?",
opts:["ออกรับเงินได้เลยเพราะรวม 20 ล้านไม่เกินวงเงินสองเท่า","รับทีละวัด คือรับวัดแรก 10 ล้านนำส่งสาขาก่อน แล้วค่อยออกรับวัดที่สอง","ปฏิเสธการรับเงินเพราะวงเงินรวม 20 ล้านเกินวงเงินประกัน 15 ล้าน","ขอขยายวงเงินประกันชั่วคราวก่อนออกรับเงิน"],
ans:1,exp:"วงเงินประกันภัยนอกสำนักงาน 15 ล้านบาท ครอบคลุมต่อครั้งที่ออกรับเงิน ดังนั้นหากรับพร้อมกัน 20 ล้าน (เกิน 15 ล้าน) จะไม่ได้รับความคุ้มครองเต็มจำนวน วิธีที่ถูกต้องคือรับทีละวัด ไม่เกินวงเงินต่อครั้ง เพื่อให้อยู่ในวงเงินคุ้มครองของประกัน",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 34"},

// ===== เงินฝาก/บัญชี =====
{id:34,cat:"เงินฝาก/บัญชี",level:"จำ",genius:"ข้อ 30",
q:"ลูกค้าทำหนังสือแจ้งระงับการจ่ายเงินจากสมุดเงินฝากออมทรัพย์ ลงวันที่ 5 มีนาคม 2567 หนังสือแจ้งระงับมีผลถึงวันใด?",
opts:["4 เมษายน 2567","5 เมษายน 2567","4 มิถุนายน 2567","5 มิถุนายน 2567"],
ans:3,exp:"หนังสือแจ้งระงับการจ่ายเงินจากสมุดบัญชีมีผลระงับ 90 วันนับจากวันที่ลงในหนังสือ (5 มีนาคม + 90 วัน = 3 มิถุนายน แต่ถ้านับแบบเต็มเดือนถึงวันที่ 5 ของเดือนที่ 3 ถัดไป = 5 มิถุนายน 2567) ตามหลักเกณฑ์ของ ธ.ก.ส.",
ref:"แนวข้อสอบจริง Genius 9 ข้อ 30"},

{id:35,cat:"เงินฝาก/บัญชี",level:"ประยุกต์",genius:"ข้อ 27",

let activeQ=[],answered={},score=0;

function startQuiz(){
  const cat=document.getElementById('filterCat').value;
  const lvl=document.getElementById('filterLvl').value;
  const n=document.getElementById('filterN').value;
  let pool=Q.filter(q=>(cat==='all'||q.cat===cat)&&(lvl==='all'||q.level===lvl));
  pool=shuffle(pool);
  if(n!=='all') pool=pool.slice(0,parseInt(n));
  activeQ=pool; answered={}; score=0;
  document.getElementById('sd').textContent='0';
  document.getElementById('td').textContent=pool.length;
  document.getElementById('summary').style.display='none';
  renderQuiz();
}

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}

function renderQuiz(){
  const area=document.getElementById('quiz-area');
  if(!activeQ.length){area.innerHTML='<div style="text-align:center;padding:40px;color:#666">ไม่พบข้อสอบ</div>';return;}
  const cats=[...new Set(activeQ.map(q=>q.cat))];
  let html='';
  cats.forEach(cat=>{
    const qs=activeQ.filter(q=>q.cat===cat);
    html+=`<div class="cat-hdr">📂 ${cat}</div>`;
    qs.forEach(q=>{
      const so=shuffle(q.opts.map((o,i)=>({t:o,orig:i})));
      const ci=so.findIndex(o=>o.orig===q.ans);
      html+=`<div class="q-card" id="qc-${q.id}">
        <div class="q-hdr"><div class="q-num">${activeQ.indexOf(q)+1}</div><div class="q-txt">${q.q}</div></div>
        <div class="meta">
          <span class="tag tc">${q.cat}</span>
          <span class="tag tl ${q.level}">${q.level}</span>
          <span class="genius">🎯 Genius9: ${q.genius}</span>
        </div>
        <div class="opts" id="op-${q.id}">`;
      so.forEach((o,oi)=>{
        html+=`<div class="opt" id="opt-${q.id}-${oi}" onclick="sel(${q.id},${oi},${ci})">${String.fromCharCode(65+oi)}. ${o.t}</div>`;
      });
      html+=`</div>
        <button class="btn-ans" id="btn-${q.id}" onclick="sub(${q.id},${ci})" disabled>✔ ตอบ</button>
        <div class="exp" id="ex-${q.id}"><strong>💡 เฉลย:</strong> ${q.exp}<div class="ref">📌 ${q.ref}</div></div>
      </div>`;
    });
  });
  area.innerHTML=html;
}

function sel(qid,oi,ci){
  if(answered[qid]!==undefined) return;
  document.querySelectorAll(`#op-${qid} .opt`).forEach(e=>e.classList.remove('selected'));
  document.getElementById(`opt-${qid}-${oi}`).classList.add('selected');
  const btn=document.getElementById(`btn-${qid}`);
  btn.dataset.sel=oi; btn.disabled=false;
}

function sub(qid,ci){
  const btn=document.getElementById(`btn-${qid}`);
  const sel=parseInt(btn.dataset.sel);
  if(isNaN(sel)) return;
  answered[qid]=sel;
  document.querySelectorAll(`#op-${qid} .opt`).forEach((e,i)=>{
    e.onclick=null;
    if(i===ci) e.classList.add('correct');
    else if(i===sel&&sel!==ci) e.classList.add('wrong');
  });
  if(sel===ci){score++;document.getElementById('sd').textContent=score;btn.textContent='✅ ถูกต้อง!';btn.style.background='#27ae60';}
  else{btn.textContent='❌ ผิด';btn.style.background='#e74c3c';}
  btn.disabled=true;
  document.getElementById(`ex-${qid}`).classList.add('show');
}

function showSummary(){
  const tot=activeQ.length;
  const pct=tot?Math.round(score/tot*100):0;
  document.getElementById('sumScore').textContent=`${score}/${tot} (${pct}%)`;
  const bl={},bt={};
  activeQ.forEach(q=>{bt[q.level]=(bt[q.level]||0)+1;});
  activeQ.forEach(q=>{if(answered[q.id]===q.ans)(bl[q.level]=(bl[q.level]||0)+1);});
  let g='';
  ['จำ','เข้าใจ','ประยุกต์','วิเคราะห์'].forEach(l=>{
    if(bt[l])g+=`<div class="si"><div class="sv">${bl[l]||0}/${bt[l]}</div><div class="sl">ระดับ${l}</div></div>`;
  });
  const bc={},bct={};
  activeQ.forEach(q=>{bct[q.cat]=(bct[q.cat]||0)+1;if(answered[q.id]===q.ans)bc[q.cat]=(bc[q.cat]||0)+1;});
  Object.keys(bct).forEach(c=>{g+=`<div class="si"><div class="sv">${bc[c]||0}/${bct[c]}</div><div class="sl">${c}</div></div>`;});
  document.getElementById('sumGrid').innerHTML=g;
  document.getElementById('summary').style.display='block';
  document.getElementById('summary').scrollIntoView({behavior:'smooth'});
}

window.onload=()=>startQuiz();
</script>
